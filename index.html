<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard - OpenVela Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; height: 100vh; }

/* Status Bar */
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #16213e; font-size: 13px; color: #8892b0; }

/* Main Content */
.main { height: calc(100vh - 36px - 60px); overflow-y: auto; position: relative; }
.page { display: none; padding: 16px; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Bottom Nav */
.nav { display: flex; justify-content: space-around; align-items: center; height: 60px; background: #16213e; border-top: 1px solid #2a2a4a; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #8892b0; font-size: 11px; cursor: pointer; padding: 8px 16px; transition: color 0.2s; }
.nav-btn.active { color: #4fc3f7; }
.nav-btn svg { width: 22px; height: 22px; fill: currentColor; }

/* Cards */
.card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 13px; color: #8892b0; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

/* Home Page - Current Weather */
.current-weather { text-align: center; padding: 20px 0; position: relative; overflow: hidden; min-height: 200px; }
.current-temp { font-size: 72px; font-weight: 200; color: #fff; }
.current-desc { font-size: 16px; color: #8892b0; margin-top: 4px; }
.current-details { display: flex; justify-content: center; gap: 24px; margin-top: 12px; font-size: 14px; color: #a0a0c0; }

/* Weather Animation Canvas */
#weather-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

/* Hourly Chart */
.chart-container { position: relative; height: 180px; }
.chart-container canvas { width: 100%; height: 100%; }

/* Forecast */
.forecast-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2a2a4a; }
.forecast-row:last-child { border-bottom: none; }
.forecast-day { width: 60px; font-size: 14px; }
.forecast-icon { font-size: 20px; width: 40px; text-align: center; }
.forecast-temps { display: flex; gap: 12px; font-size: 14px; }
.forecast-high { color: #ff7043; }
.forecast-low { color: #4fc3f7; }

/* Detail Page - Gauges */
.gauges-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.gauge-card { background: #16213e; border-radius: 12px; padding: 16px; text-align: center; }
.gauge-card canvas { display: block; margin: 0 auto 8px; }
.gauge-label { font-size: 12px; color: #8892b0; }
.gauge-value { font-size: 22px; font-weight: 600; margin-top: 4px; }

/* UV & Wind */
.uv-bar-container { margin-top: 8px; }
.uv-bar { height: 8px; border-radius: 4px; background: linear-gradient(to right, #4caf50, #ffeb3b, #ff9800, #f44336, #9c27b0); position: relative; }
.uv-indicator { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; top: -2px; transition: left 0.5s; box-shadow: 0 0 6px rgba(255,255,255,0.5); }
.uv-labels { display: flex; justify-content: space-between; font-size: 11px; color: #8892b0; margin-top: 4px; }

.wind-display { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 12px; }
.wind-compass { width: 80px; height: 80px; position: relative; }
.wind-compass canvas { width: 100%; height: 100%; }
.wind-info { text-align: left; }
.wind-speed { font-size: 28px; font-weight: 600; color: #4fc3f7; }
.wind-unit { font-size: 13px; color: #8892b0; }
.wind-dir { font-size: 14px; color: #a0a0c0; margin-top: 4px; }

/* Settings Page */
.setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #2a2a4a; }
.setting-item:last-child { border-bottom: none; }
.setting-label { font-size: 15px; }
.setting-sublabel { font-size: 12px; color: #8892b0; margin-top: 2px; }

/* Toggle Switch */
.toggle { width: 48px; height: 26px; background: #2a2a4a; border-radius: 13px; position: relative; cursor: pointer; transition: background 0.3s; }
.toggle.on { background: #4fc3f7; }
.toggle::after { content: ''; width: 22px; height: 22px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.3s; }
.toggle.on::after { transform: translateX(22px); }

/* Select */
.setting-select { background: #2a2a4a; color: #eee; border: none; padding: 6px 12px; border-radius: 6px; font-size: 14px; }

/* Slider */
.setting-slider { width: 120px; accent-color: #4fc3f7; }

/* About */
.about-section { text-align: center; padding: 20px 0; color: #8892b0; font-size: 13px; line-height: 1.8; }
.about-section .app-name { font-size: 18px; color: #eee; font-weight: 600; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span id="city-name">北京</span>
  <span id="clock">--:--</span>
</div>

<!-- Main Content -->
<div class="main">
  <!-- Home Page -->
  <div class="page active" id="page-home">
    <div class="card current-weather">
      <canvas id="weather-canvas"></canvas>
      <div class="current-temp" id="cur-temp">26°</div>
      <div class="current-desc" id="cur-desc">多云</div>
      <div class="current-details">
        <span>💧 <span id="cur-hum">65%</span></span>
        <span>🌬️ <span id="cur-wind">12 km/h</span></span>
        <span>📊 <span id="cur-press">1013 hPa</span></span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">24小时预报</div>
      <div class="chart-container"><canvas id="hourly-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">7天预报</div>
      <div id="forecast-list"></div>
    </div>
  </div>

  <!-- Detail Page -->
  <div class="page" id="page-detail">
    <div class="gauges-grid">
      <div class="gauge-card">
        <canvas id="gauge-temp" width="120" height="120"></canvas>
        <div class="gauge-label">温度</div>
        <div class="gauge-value" id="gv-temp" style="color:#ff7043">26°C</div>
      </div>
      <div class="gauge-card">
        <canvas id="gauge-hum" width="120" height="120"></canvas>
        <div class="gauge-label">湿度</div>
        <div class="gauge-value" id="gv-hum" style="color:#4fc3f7">65%</div>
      </div>
      <div class="gauge-card">
        <canvas id="gauge-press" width="120" height="120"></canvas>
        <div class="gauge-label">气压</div>
        <div class="gauge-value" id="gv-press" style="color:#66bb6a">1013</div>
      </div>
      <div class="gauge-card">
        <canvas id="gauge-aqi" width="120" height="120"></canvas>
        <div class="gauge-label">AQI</div>
        <div class="gauge-value" id="gv-aqi" style="color:#ffd54f">72</div>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-title">UV 指数</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span style="font-size:28px;font-weight:600;color:#ffeb3b" id="uv-value">5</span>
        <span style="color:#8892b0" id="uv-level">中等</span>
      </div>
      <div class="uv-bar-container">
        <div class="uv-bar"><div class="uv-indicator" id="uv-dot"></div></div>
        <div class="uv-labels"><span>低</span><span>中</span><span>高</span><span>很高</span><span>极高</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">风速与风向</div>
      <div class="wind-display">
        <div class="wind-compass"><canvas id="compass-canvas" width="80" height="80"></canvas></div>
        <div class="wind-info">
          <div class="wind-speed" id="wind-speed-val">12</div>
          <div class="wind-unit">km/h</div>
          <div class="wind-dir" id="wind-dir-val">东南风 (SE)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Page -->
  <div class="page" id="page-settings">
    <div class="card">
      <div class="card-title">偏好设置</div>
      <div class="setting-item">
        <div>
          <div class="setting-label">温度单位</div>
          <div class="setting-sublabel">切换 °C / °F</div>
        </div>
        <div class="toggle" id="unit-toggle" onclick="toggleUnit()"></div>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">城市</div>
          <div class="setting-sublabel">选择显示城市</div>
        </div>
        <select class="setting-select" id="city-select" onchange="changeCity()">
          <option value="北京">北京</option>
          <option value="上海">上海</option>
          <option value="广州">广州</option>
          <option value="深圳">深圳</option>
          <option value="成都">成都</option>
        </select>
      </div>
      <div class="setting-item">
        <div>
          <div class="setting-label">刷新间隔</div>
          <div class="setting-sublabel" id="refresh-label">5 秒</div>
        </div>
        <input type="range" class="setting-slider" min="1" max="30" value="5" id="refresh-slider" oninput="changeRefresh()">
      </div>
    </div>
    <div class="card">
      <div class="about-section">
        <div class="app-name">🌤️ Weather Dashboard</div>
        <div style="margin-top:8px">OpenVela Demo Application</div>
        <div>Version 1.0.0</div>
        <div style="margin-top:8px">基于 LVGL 天气仪表盘的 Web 预览版</div>
        <div>Apache License 2.0</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('home', this)">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>主页</span>
  </button>
  <button class="nav-btn" onclick="switchPage('detail', this)">
    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
    <span>详情</span>
  </button>
  <button class="nav-btn" onclick="switchPage('settings', this)">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
    <span>设置</span>
  </button>
</nav>

<script>
// ===== Data Model =====
const weatherConditions = ['晴', '多云', '阴', '小雨', '大雨', '雪'];
const conditionIcons = ['☀️', '⛅', '☁️', '🌧️', '🌧️', '❄️'];
let useCelsius = true;
let refreshInterval = 5;
let currentCity = '北京';
let weatherData = generateWeatherData();
let particles = [];
let animFrame;

function generateWeatherData() {
  const condIdx = Math.floor(Math.random() * weatherConditions.length);
  const baseTemp = 20 + Math.random() * 15;
  const hourly = Array.from({length: 24}, (_, i) => ({
    temp: baseTemp + Math.sin(i / 24 * Math.PI * 2) * 5 + (Math.random() - 0.5) * 2,
    hum: 50 + Math.random() * 40
  }));
  const forecast = Array.from({length: 7}, (_, i) => {
    const ci = Math.floor(Math.random() * weatherConditions.length);
    const high = baseTemp + Math.random() * 5;
    return { day: ['今天','明天','周三','周四','周五','周六','周日'][i], icon: conditionIcons[ci], high: Math.round(high), low: Math.round(high - 5 - Math.random() * 5) };
  });
  return {
    condIdx, temp: Math.round(baseTemp), humidity: Math.round(50 + Math.random() * 40),
    pressure: Math.round(1000 + Math.random() * 30), windSpeed: Math.round(5 + Math.random() * 25),
    windDeg: Math.round(Math.random() * 360), aqi: Math.round(30 + Math.random() * 150),
    uv: Math.round(Math.random() * 11), hourly, forecast
  };
}

// ===== Navigation =====
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'detail') { drawAllGauges(); drawCompass(); }
  if (name === 'home') drawHourlyChart();
}

// ===== Clock =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toTimeString().slice(0, 5);
}
setInterval(updateClock, 1000);
updateClock();

// ===== Settings =====
function toggleUnit() {
  useCelsius = !useCelsius;
  document.getElementById('unit-toggle').classList.toggle('on');
  updateUI();
}
function changeCity() {
  currentCity = document.getElementById('city-select').value;
  document.getElementById('city-name').textContent = currentCity;
  weatherData = generateWeatherData();
  updateUI();
}
function changeRefresh() {
  refreshInterval = parseInt(document.getElementById('refresh-slider').value);
  document.getElementById('refresh-label').textContent = refreshInterval + ' 秒';
}

function toF(c) { return Math.round(c * 9 / 5 + 32); }
function dispTemp(c) { return useCelsius ? c + '°C' : toF(c) + '°F'; }

// ===== Update UI =====
function updateUI() {
  const d = weatherData;
  document.getElementById('cur-temp').textContent = useCelsius ? d.temp + '°' : toF(d.temp) + '°';
  document.getElementById('cur-desc').textContent = weatherConditions[d.condIdx];
  document.getElementById('cur-hum').textContent = d.humidity + '%';
  document.getElementById('cur-wind').textContent = d.windSpeed + ' km/h';
  document.getElementById('cur-press').textContent = d.pressure + ' hPa';

  // Forecast
  const fl = document.getElementById('forecast-list');
  fl.innerHTML = d.forecast.map(f => `
    <div class="forecast-row">
      <span class="forecast-day">${f.day}</span>
      <span class="forecast-icon">${f.icon}</span>
      <div class="forecast-temps">
        <span class="forecast-high">${useCelsius ? f.high + '°' : toF(f.high) + '°'}</span>
        <span class="forecast-low">${useCelsius ? f.low + '°' : toF(f.low) + '°'}</span>
      </div>
    </div>`).join('');

  // Detail values
  document.getElementById('gv-temp').textContent = dispTemp(d.temp);
  document.getElementById('gv-hum').textContent = d.humidity + '%';
  document.getElementById('gv-press').textContent = d.pressure;
  document.getElementById('gv-aqi').textContent = d.aqi;
  document.getElementById('uv-value').textContent = d.uv;
  const uvLevels = ['低','低','低','中等','中等','中等','高','高','很高','很高','极高','极高'];
  document.getElementById('uv-level').textContent = uvLevels[d.uv] || '极高';
  document.getElementById('uv-dot').style.left = (d.uv / 11 * 100) + '%';
  document.getElementById('wind-speed-val').textContent = d.windSpeed;
  const dirs = ['北','东北','东','东南','南','西南','西','西北'];
  const dirIdx = Math.round(d.windDeg / 45) % 8;
  document.getElementById('wind-dir-val').textContent = dirs[dirIdx] + '风';

  drawHourlyChart();
  initWeatherAnim();
}

// ===== Hourly Chart (Canvas) =====
function drawHourlyChart() {
  const canvas = document.getElementById('hourly-chart');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2; canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const w = rect.width, h = rect.height;
  const data = weatherData.hourly;
  const temps = data.map(d => d.temp);
  const hums = data.map(d => d.hum);
  const minT = Math.min(...temps) - 2, maxT = Math.max(...temps) + 2;

  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 0.5;
  for (let i = 0; i < 5; i++) {
    const y = 20 + (h - 40) * i / 4;
    ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(w - 10, y); ctx.stroke();
  }

  // Temp line
  ctx.strokeStyle = '#ff7043'; ctx.lineWidth = 2;
  ctx.beginPath();
  temps.forEach((t, i) => {
    const x = 40 + (w - 50) * i / 23;
    const y = 20 + (h - 40) * (1 - (t - minT) / (maxT - minT));
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Humidity line
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
  ctx.beginPath();
  hums.forEach((hu, i) => {
    const x = 40 + (w - 50) * i / 23;
    const y = 20 + (h - 40) * (1 - hu / 100);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = '#8892b0'; ctx.font = '10px sans-serif';
  for (let i = 0; i < 24; i += 4) {
    const x = 40 + (w - 50) * i / 23;
    ctx.fillText(i + ':00', x - 12, h - 4);
  }
  // Y labels
  for (let i = 0; i < 5; i++) {
    const y = 20 + (h - 40) * i / 4;
    const val = maxT - (maxT - minT) * i / 4;
    ctx.fillText(Math.round(val) + '°', 4, y + 4);
  }

  // Legend
  ctx.fillStyle = '#ff7043'; ctx.fillRect(w - 100, 8, 12, 3);
  ctx.fillStyle = '#8892b0'; ctx.fillText('温度', w - 84, 12);
  ctx.fillStyle = '#4fc3f7'; ctx.fillRect(w - 50, 8, 12, 3);
  ctx.fillStyle = '#8892b0'; ctx.fillText('湿度', w - 34, 12);
}

// ===== Gauge Drawing =====
function drawGauge(canvasId, value, max, color) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const cx = 60, cy = 65, r = 45;
  ctx.clearRect(0, 0, 120, 120);

  // Background arc
  ctx.beginPath(); ctx.arc(cx, cy, r, 0.75 * Math.PI, 2.25 * Math.PI);
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke();

  // Value arc
  const pct = Math.min(value / max, 1);
  const endAngle = 0.75 * Math.PI + pct * 1.5 * Math.PI;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0.75 * Math.PI, endAngle);
  ctx.strokeStyle = color; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke();

  // Center dot
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

function drawAllGauges() {
  const d = weatherData;
  drawGauge('gauge-temp', d.temp, 50, '#ff7043');
  drawGauge('gauge-hum', d.humidity, 100, '#4fc3f7');
  drawGauge('gauge-press', d.pressure - 950, 100, '#66bb6a');
  drawGauge('gauge-aqi', d.aqi, 300, d.aqi < 50 ? '#66bb6a' : d.aqi < 100 ? '#ffd54f' : '#ff7043');
}

// ===== Compass =====
function drawCompass() {
  const canvas = document.getElementById('compass-canvas');
  const ctx = canvas.getContext('2d');
  const cx = 40, cy = 40, r = 32;
  ctx.clearRect(0, 0, 80, 80);

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#8892b0'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('N', cx, cy - r + 10);
  ctx.fillText('S', cx, cy + r - 4);
  ctx.fillText('E', cx + r - 6, cy + 4);
  ctx.fillText('W', cx - r + 6, cy + 4);

  // Arrow
  const rad = (weatherData.windDeg - 90) * Math.PI / 180;
  const ax = cx + Math.cos(rad) * (r - 10);
  const ay = cy + Math.sin(rad) * (r - 10);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ax, ay);
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(ax, ay, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#4fc3f7'; ctx.fill();
}

// ===== Weather Animation =====
function initWeatherAnim() {
  particles = [];
  const cond = weatherData.condIdx;
  if (cond === 3 || cond === 4) { // Rain
    for (let i = 0; i < (cond === 4 ? 80 : 30); i++) {
      particles.push({ x: Math.random() * 400, y: Math.random() * 200, speed: 3 + Math.random() * 4, type: 'rain' });
    }
  } else if (cond === 5) { // Snow
    for (let i = 0; i < 40; i++) {
      particles.push({ x: Math.random() * 400, y: Math.random() * 200, speed: 0.5 + Math.random() * 1.5, size: 2 + Math.random() * 3, drift: Math.random() * 2 - 1, type: 'snow' });
    }
  } else if (cond === 0) { // Sun glow
    particles.push({ type: 'sun', phase: 0 });
  }
  if (!animFrame) animateWeather();
}

function animateWeather() {
  const canvas = document.getElementById('weather-canvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * 2; canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const w = rect.width, h = rect.height;
  ctx.clearRect(0, 0, w, h);

  particles.forEach(p => {
    if (p.type === 'rain') {
      p.y += p.speed; if (p.y > h) { p.y = -5; p.x = Math.random() * w; }
      ctx.strokeStyle = 'rgba(79,195,247,0.5)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 1, p.y + 8); ctx.stroke();
    } else if (p.type === 'snow') {
      p.y += p.speed; p.x += p.drift; if (p.y > h) { p.y = -5; p.x = Math.random() * w; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
    } else if (p.type === 'sun') {
      p.phase += 0.02;
      const glow = 0.08 + Math.sin(p.phase) * 0.04;
      const grad = ctx.createRadialGradient(w / 2, 40, 10, w / 2, 40, 100);
      grad.addColorStop(0, `rgba(255,235,59,${glow + 0.1})`);
      grad.addColorStop(1, 'rgba(255,235,59,0)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    }
  });

  animFrame = requestAnimationFrame(animateWeather);
}

// ===== Auto Refresh =====
setInterval(() => {
  weatherData = generateWeatherData();
  updateUI();
}, refreshInterval * 1000);

// ===== Init =====
updateUI();
</script>
